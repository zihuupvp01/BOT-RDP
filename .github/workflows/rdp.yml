name: Free RDP Generator

on:
  workflow_dispatch:
  repository_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v2
    
    - name: Setup Ngrok
      run: |
        Invoke-WebRequest -Uri "https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip" -OutFile "ngrok.zip"
        Expand-Archive -Path "ngrok.zip" -DestinationPath "."
        Remove-Item "ngrok.zip"
    
    - name: Configure Ngrok
      run: .\ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
    
    - name: Enable RDP
      run: |
        Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path "HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp" -Name "UserAuthentication" -Value 0
    
    - name: Start Tunnel
      run: |
        Start-Process -NoNewWindow -FilePath ".\ngrok" -ArgumentList "tcp 3389"
        Start-Sleep -Seconds 10
        
        $tunnel = Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels"
        $public_url = $tunnel.tunnels[0].public_url
        $host_port = $public_url -replace "tcp://", ""
        
        Write-Output "========================================="
        Write-Output "🎉 RDP READY!"
        Write-Output "========================================="
        Write-Output "Host: $host_port"
        Write-Output "IP: $host_port"
        Write-Output "Port: 3389"
        Write-Output "Username: runneradmin"
        Write-Output "Password: ${{ secrets.RDP_PASSWORD }}"
        Write-Output "========================================="
    
    - name: Keep Alive
      run: Start-Sleep -Seconds 21600
